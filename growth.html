<main class="md:ml-64 min-h-screen flex flex-col p-margin-page lg:p-section-gap gap-section-gap" style="max-width: none; padding-top: 2rem;">

<!-- GROWTH (Tasks & Projects) -->
<div id="page-growth" class="page active">
  <header class="max-w-4xl pt-8 md:pt-12 mb-12">
    <span class="font-label-caps text-secondary mb-4 block tracking-widest uppercase">Progress & Potential</span>
    <h1 class="font-h1 text-h1 text-on-surface mb-6">Growth</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Shape your future by tending to the tasks and projects of today.</p>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
    <!-- Tasks Section -->
    <div class="lg:col-span-7 flex flex-col gap-6">
      <div class="bg-white/[0.05] backdrop-blur-[20px] border border-outline-variant/30 rounded-xl p-6 md:p-8">
        <div class="flex items-center justify-between mb-6">
          <span class="font-label-caps text-label-caps text-secondary tracking-widest uppercase">Task Garden</span>
          <span id="task-count" class="text-xs text-on-surface-variant uppercase tracking-widest"></span>
        </div>
        
        <div class="flex flex-col gap-4 mb-8">
          <div class="cal-strip flex gap-2 overflow-x-auto pb-4 hide-scrollbar" id="cal-strip"></div>
          <div id="past-day-panel" class="hidden bg-white/5 rounded-lg p-4 border border-white/10 mb-4">
            <div class="flex justify-between items-center mb-4">
              <div id="past-day-label" class="font-h3 text-lg text-secondary"></div>
              <button class="text-on-surface-variant hover:text-on-surface" onclick="closePastDay()">✕</button>
            </div>
            <div id="past-day-tasks" class="flex flex-col gap-2"></div>
          </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
          <button class="bg-white/5 border border-white/10 text-on-surface-variant px-4 py-1.5 rounded-full text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors" onclick="filterTasks('all')">All</button>
          <button class="bg-white/5 border border-white/10 text-on-surface-variant px-4 py-1.5 rounded-full text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors" onclick="filterTasks('task')">Tasks</button>
          <button class="bg-white/5 border border-white/10 text-on-surface-variant px-4 py-1.5 rounded-full text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors" onclick="filterTasks('project')">Projects</button>
          <button class="bg-white/5 border border-white/10 text-on-surface-variant px-4 py-1.5 rounded-full text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors" onclick="filterTasks('personal')">Personal</button>
          <button class="bg-white/5 border border-white/10 text-on-surface-variant px-4 py-1.5 rounded-full text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors" onclick="filterTasks('done')">Completed</button>
        </div>

        <div id="task-list-main" class="flex flex-col gap-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
          <div class="empty-state text-center text-on-surface-variant italic py-12">No tasks yet.</div>
        </div>

        <div class="mt-8 pt-8 border-t border-white/10">
          <span class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-4 block">Sow a New Task</span>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="t-name" placeholder="Task name..." class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface focus:ring-secondary focus:border-secondary">
            <div class="grid grid-cols-2 gap-2">
              <select id="t-cat" class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface focus:ring-secondary focus:border-secondary">
                <option value="task">📋 Task</option>
                <option value="project">📁 Project</option>
                <option value="personal">💛 Personal</option>
              </select>
              <select id="t-priority" class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface focus:ring-secondary focus:border-secondary">
                <option value="high">🔴 High</option>
                <option value="medium">🟡 Medium</option>
                <option value="low">🟢 Low</option>
              </select>
            </div>
            <input type="text" id="t-notes" placeholder="Notes..." class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface focus:ring-secondary focus:border-secondary">
            <input type="date" id="t-due" class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface focus:ring-secondary focus:border-secondary">
          </div>
          <button class="mt-4 bg-secondary/10 border border-secondary/30 text-secondary px-6 py-2.5 rounded-lg font-label-caps text-xs uppercase tracking-widest hover:bg-secondary/20 transition-all" onclick="addTask()">Add Task</button>
        </div>
      </div>
    </div>

    <!-- Projects Section -->
    <div class="lg:col-span-5 flex flex-col gap-6">
      <div class="bg-white/[0.05] backdrop-blur-[20px] border border-outline-variant/30 rounded-xl p-6 md:p-8">
        <span class="font-label-caps text-label-caps text-secondary mb-6 block tracking-widest uppercase">Project Arcs</span>
        
        <div id="project-chart-wrap" class="flex gap-4 mb-8 overflow-x-auto pb-4 hide-scrollbar"></div>

        <div id="projects-list" class="flex flex-col gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
          <div class="empty-state text-center text-on-surface-variant italic py-8">No projects yet.</div>
        </div>

        <div class="mt-8 pt-8 border-t border-white/10">
          <span class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-4 block">Begin a Long Arc</span>
          <div class="flex flex-col gap-4">
            <input type="text" id="p-name" placeholder="Project name..." class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface">
            <textarea id="p-desc" placeholder="Vision and scope..." class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface h-20 resize-none"></textarea>
            <div class="grid grid-cols-2 gap-2">
              <select id="p-status" class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface">
                <option value="active">Active</option>
                <option value="paused">Paused</option>
                <option value="done">Done</option>
              </select>
              <input type="number" id="p-pct" placeholder="Progress %" class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface">
            </div>
            <input type="date" id="p-deadline" class="bg-white/5 border border-white/10 rounded-lg p-3 text-on-surface">
            <button class="bg-secondary/10 border border-secondary/30 text-secondary px-6 py-2.5 rounded-lg font-label-caps text-xs uppercase tracking-widest hover:bg-secondary/20 transition-all" onclick="addProject()">Launch Project</button>
          </div>
        </div>
      </div>
      
      <!-- Stats Summary -->
      <div class="bg-white/[0.03] backdrop-blur-[20px] border border-outline-variant/20 rounded-xl p-6">
        <span class="font-label-caps text-label-caps text-on-surface-variant mb-4 block tracking-widest uppercase">Velocity</span>
        <div class="chart-wrap h-32" id="task-chart-container">
          <div class="bar-chart-inner h-full flex items-end gap-1" id="task-bar-chart"></div>
        </div>
        <div id="task-bar-x" class="flex justify-between mt-2 text-[8px] text-on-surface-variant uppercase tracking-tighter"></div>
      </div>
    </div>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
