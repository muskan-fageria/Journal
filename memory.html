<main class="md:ml-64 min-h-screen flex flex-col p-margin-page lg:p-section-gap gap-section-gap" style="max-width: none; padding-top: 2rem;">

<!-- MEMORY GALLERY -->
<div id="page-memory" class="page active">
  <header class="max-w-4xl pt-8 md:pt-12 mb-12 flex flex-col md:flex-row md:items-end justify-between gap-8">
    <div>
      <span class="font-label-caps text-secondary mb-4 block tracking-widest uppercase">Chronicles of Light</span>
      <h1 class="font-h1 text-h1 text-on-surface mb-6">Memory Gallery</h1>
      <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl leading-relaxed">
        A gentle walkthrough of your shared moments and quiet realizations.
      </p>
    </div>
    <button onclick="openMemoryModal()" class="bg-secondary/10 border border-secondary/30 text-secondary px-8 py-3 rounded-full font-label-caps text-xs uppercase tracking-widest hover:bg-secondary/20 transition-all flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px]">add_a_photo</span>
      Capture Moment
    </button>
  </header>

  <section class="pb-section-gap max-w-7xl mx-auto w-full">
    <div id="memory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
      <!-- Memories injected here by journal.js -->
      <div class="col-span-full py-20 text-center text-stone-500 italic">Capturing your reflections...</div>
    </div>
    
    <div class="mt-16 flex justify-center">
      <button class="font-label-caps text-label-caps text-secondary uppercase tracking-widest border-b border-secondary pb-1 hover:text-secondary-fixed transition-colors duration-300">
        Explore Further
      </button>
    </div>
  </section>
</div>

</main>

<!-- MEMORY MODAL -->
<div id="memory-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-stone-950/60 backdrop-blur-md p-6">
  <div class="bg-stone-900 border border-white/10 rounded-2xl w-full max-w-lg p-8 shadow-2xl relative">
    <button onclick="closeMemoryModal()" class="absolute top-6 right-6 text-stone-500 hover:text-stone-100 transition-colors">
      <span class="material-symbols-outlined">close</span>
    </button>
    
    <h2 class="font-h2 text-2xl text-on-surface mb-8">Capture a Memory</h2>
    
    <div class="flex flex-col gap-6">
      <div>
        <label class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-2 block">The Reflection</label>
        <textarea id="m-content" placeholder="What happened in this moment?" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-on-surface focus:border-secondary focus:ring-0 min-h-[120px] resize-none"></textarea>
      </div>
      
      <div>
        <label class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-2 block">Image URL</label>
        <input type="text" id="m-image" placeholder="https://unsplash.com/..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-on-surface focus:border-secondary focus:ring-0">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-2 block">Tags (comma separated)</label>
          <input type="text" id="m-tags" placeholder="Clarity, Stillness" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-on-surface focus:border-secondary focus:ring-0">
        </div>
        <div class="flex items-center gap-3 pt-6">
          <input type="checkbox" id="m-italic" class="w-5 h-5 rounded border-white/10 bg-white/5 text-secondary focus:ring-0">
          <label for="m-italic" class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest cursor-pointer">Poetic Style</label>
        </div>
      </div>
      
      <button onclick="addMemory()" class="w-full bg-secondary text-on-secondary font-label-caps py-4 rounded-xl hover:bg-secondary-fixed transition-all mt-4 uppercase tracking-widest">
        Preserve Memory
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
