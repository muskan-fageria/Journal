<div id="page-tasks" class="page">
    <link rel="stylesheet" href="task.css">
    <!--Add new tasks-->
    <div class="task-box">
        <h2>Create New Task</h2>
        <div class="form-group">
            <label for="taskName">Task Name</label>
            <input type="text" id="taskName" class="form-control" placeholder="What are you working on?">
        </div>
        <div class="form-group">
            <label for="taskDate">Due Date</label>
            <input type="date" id="taskDate" class="form-control">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="taskTimeFrom">Time From</label>
                <input type="time" id="taskTimeFrom" class="form-control">
            </div>
            <div class="form-group">
                <label for="taskTimeTo">Time To</label>
                <input type="time" id="taskTimeTo" class="form-control">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="taskPriority">Priority</label>
                <select id="taskPriority" class="form-control">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label for="taskRepeat">Repeat</label>
                <select id="taskRepeat" class="form-control">
                    <option value="none">Does not repeat</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="taskDesc">Description</label>
            <textarea id="taskDesc" class="form-control" placeholder="Add any details or notes here..."></textarea>
        </div>
        <button type="button" id="btnAddTask" class="btn-add">Add Task</button>
    </div>
    <!--Add new event-->
    <div class="task-box" style="margin-top: 30px;">
        <h2>Add New Event</h2>
        <div class="form-group">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" class="form-control" placeholder="What's the event?">
        </div>
        <div class="form-group">
            <label for="eventDateTime">Date & Time</label>
            <input type="datetime-local" id="eventDateTime" class="form-control">
        </div>
        <div class="form-group">
            <label for="eventDesc">Description</label>
            <textarea id="eventDesc" class="form-control" placeholder="Add any event details..."></textarea>
        </div>
        <button type="button" id="btnAddEvent" class="btn-add" style="background: #9f7aea;">Add Event</button>
    </div>
    <!--Project-->
    <div class="task-box" style="margin-top: 30px; margin-bottom: 30px;">
        <h2>Add New Project</h2>

        <div class="form-group">
            <label for="projectName">Project Name</label>
            <input type="text" id="projectName" class="form-control" placeholder="What's the project?">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="projectDateFrom">Date From</label>
                <input type="date" id="projectDateFrom" class="form-control">
            </div>
            <div class="form-group">
                <label for="projectDateTo">Date To</label>
                <input type="date" id="projectDateTo" class="form-control">
            </div>
        </div>

        <div class="form-group">
            <label for="projectDesc">Description</label>
            <textarea id="projectDesc" class="form-control" placeholder="Add project details or goals..."></textarea>
        </div>
        <div class="form-group">
            <label for="projectCompletion" style="display: flex; justify-content: space-between;">
                <span>Completion Progress</span>
                <span id="completionValue" style="color: #38b2ac; font-weight: 600;">0%</span>
            </label>
            <input type="range" id="projectCompletion" min="0" max="100" value="0"
                style="width: 100%; margin-top: 5px; cursor: pointer; accent-color: #38b2ac;"
                oninput="document.getElementById('completionValue').innerText = this.value + '%'">
        </div>

        <button type="button" id="btnAddProject" class="btn-add" style="background: #38b2ac;">Add Project</button>
    </div>

    <!-- Calendar -->
    <div class="task-box" style="margin-top: 30px; margin-bottom: 30px;">
        <h2>Current Week</h2>
        <div id="weekCalendar" style="display: flex; justify-content: space-between; gap: 8px;">
            <!-- JS will populate the days -->
        </div>
    </div>

    <!--Upcomings-->
    <div class="task-box" style="margin-top: 30px; margin-bottom: 30px;">
        <h2>Upcomings</h2>
        <div id="upcomingContainer" style="display: flex; flex-direction: column; gap: 12px;">
            <div style="text-align: center; color: #a0aec0; font-size: 14px; padding: 20px 0;" id="emptyState">
                No upcomings yet. Add a task, event, or project above!
            </div>
        </div>
    </div>

    <script>
        function generateCurrentWeek() {
            const calendar = document.getElementById('weekCalendar');
            calendar.innerHTML = '';

            const today = new Date();
            const dayOfWeek = today.getDay(); // 0 is Sunday

            const startDate = new Date(today);
            startDate.setDate(today.getDate() - dayOfWeek);

            for (let i = 0; i < 7; i++) {
                const currentDate = new Date(startDate);
                currentDate.setDate(startDate.getDate() + i);

                const isToday = currentDate.toDateString() === today.toDateString();
                const dayName = currentDate.toLocaleDateString('en-US', { weekday: 'short' });
                const dateNum = currentDate.getDate();

                const year = currentDate.getFullYear();
                const month = String(currentDate.getMonth() + 1).padStart(2, '0');
                const day = String(currentDate.getDate()).padStart(2, '0');
                const dateKey = `${year}-${month}-${day}`;

                const dayDiv = document.createElement('div');
                dayDiv.style.cssText = `flex: 1; text-align: center; padding: 12px 4px; border-radius: 12px; border: 1px solid ${isToday ? '#4299e1' : '#e2e8f0'}; background: ${isToday ? '#ebf8ff' : '#f8fafc'}; display: flex; flex-direction: column; align-items: center;`;
                dayDiv.dataset.date = dateKey;

                const nameEl = document.createElement('div');
                nameEl.style.cssText = `font-size: 12px; color: ${isToday ? '#2b6cb0' : '#718096'}; font-weight: 500; text-transform: uppercase; margin-bottom: 4px;`;
                nameEl.textContent = dayName;

                const numEl = document.createElement('div');
                numEl.style.cssText = `font-size: 18px; color: ${isToday ? '#2b6cb0' : '#2d3748'}; font-weight: 600; margin-bottom: 8px;`;
                numEl.textContent = dateNum;

                const dotsContainer = document.createElement('div');
                dotsContainer.className = 'dots-container';
                dotsContainer.style.cssText = 'display: flex; justify-content: center; align-items: center; gap: 4px; height: 6px; flex-wrap: wrap; max-width: 100%;';

                dayDiv.appendChild(nameEl);
                dayDiv.appendChild(numEl);
                dayDiv.appendChild(dotsContainer);

                calendar.appendChild(dayDiv);
            }
        }

        function addCalendarDot(dateString, typeColor) {
            if (!dateString) return;
            const dateKey = dateString.split('T')[0];
            const dayDiv = document.querySelector(`#weekCalendar div[data-date="${dateKey}"] .dots-container`);

            if (dayDiv) {
                const dot = document.createElement('div');
                dot.style.cssText = `width: 6px; height: 6px; border-radius: 50%; background-color: ${typeColor};`;
                dayDiv.appendChild(dot);
            }
        }

        generateCurrentWeek();

        function createUpcomingItem(title, subtitle, badgeText, badgeColor, type = '', progress = 0, description = '') {
            const item = document.createElement('div');
            item.style.cssText = 'padding: 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; display: flex; align-items: center; gap: 12px; transition: all 0.2s;';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.style.cssText = 'width: 18px; height: 18px; cursor: pointer; accent-color: ' + badgeColor + '; flex-shrink: 0;';
            checkbox.addEventListener('change', function () {
                if (this.checked) {
                    item.style.opacity = '0';
                    setTimeout(() => {
                        item.remove();
                        item.style.opacity = '1';
                        checkbox.style.display = 'none';
                        
                        const completedContainer = document.getElementById('completedContainer');
                        const emptyCompletedState = document.getElementById('emptyCompletedState');
                        if (emptyCompletedState) emptyCompletedState.remove();
                        
                        const sliders = item.querySelectorAll('input[type="range"]');
                        sliders.forEach(s => s.disabled = true);
                        
                        const deleteBtn = document.createElement('div');
                        deleteBtn.innerHTML = '🗑️';
                        deleteBtn.style.cssText = 'cursor: pointer; font-size: 16px; margin-left: auto; padding: 4px; transition: transform 0.2s;';
                        deleteBtn.addEventListener('mouseenter', () => deleteBtn.style.transform = 'scale(1.2)');
                        deleteBtn.addEventListener('mouseleave', () => deleteBtn.style.transform = 'scale(1)');
                        deleteBtn.addEventListener('click', () => {
                            item.style.opacity = '0';
                            setTimeout(() => {
                                item.remove();
                                if (completedContainer.children.length === 0) {
                                    completedContainer.innerHTML = '<div style="text-align: center; color: #a0aec0; font-size: 14px; padding: 20px 0;" id="emptyCompletedState">No completed items yet.</div>';
                                }
                            }, 200);
                        });
                        
                        item.appendChild(deleteBtn);
                        completedContainer.appendChild(item);
                    }, 200);
                }
            });

            const contentDiv = document.createElement('div');
            contentDiv.style.flex = '1';

            const topRow = document.createElement('div');
            topRow.style.cssText = 'display: flex; justify-content: space-between; align-items: flex-start;';

            const textDiv = document.createElement('div');
            const titleEl = document.createElement('div');
            titleEl.style.cssText = 'font-weight: 600; color: #2d3748; margin-bottom: 4px; font-size: 15px;';
            titleEl.textContent = title;

            const subtitleEl = document.createElement('div');
            subtitleEl.style.cssText = 'font-size: 13px; color: #718096;';
            subtitleEl.textContent = subtitle;

            textDiv.appendChild(titleEl);
            textDiv.appendChild(subtitleEl);

            const badge = document.createElement('div');
            badge.style.cssText = `font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: ${badgeColor}22; color: ${badgeColor}; white-space: nowrap;`;
            badge.textContent = badgeText;

            topRow.appendChild(textDiv);
            topRow.appendChild(badge);
            contentDiv.appendChild(topRow);

            if (description) {
                const descEl = document.createElement('div');
                descEl.style.cssText = 'font-size: 13px; color: #4a5568; margin-top: 8px; line-height: 1.4;';
                descEl.textContent = description;
                contentDiv.appendChild(descEl);
            }

            if (type === 'Project') {
                const sliderDiv = document.createElement('div');
                sliderDiv.style.cssText = 'margin-top: 12px; display: flex; align-items: center; gap: 8px;';

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.min = '0';
                slider.max = '100';
                slider.value = progress;
                slider.style.cssText = 'flex: 1; cursor: pointer; accent-color: ' + badgeColor + ';';

                const progressText = document.createElement('span');
                progressText.style.cssText = 'font-size: 12px; font-weight: 600; color: ' + badgeColor + '; min-width: 35px; text-align: right;';
                progressText.textContent = progress + '%';

                slider.addEventListener('input', function () {
                    progressText.textContent = this.value + '%';
                });

                sliderDiv.appendChild(slider);
                sliderDiv.appendChild(progressText);
                contentDiv.appendChild(sliderDiv);
            }

            item.appendChild(checkbox);
            item.appendChild(contentDiv);

            return item;
        }

        function appendUpcoming(item) {
            const container = document.getElementById('upcomingContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();
            container.appendChild(item);
        }

        document.getElementById('btnAddTask').addEventListener('click', function () {
            const name = document.getElementById('taskName').value;
            const date = document.getElementById('taskDate').value;
            const desc = document.getElementById('taskDesc').value;
            if (!name) return alert('Please enter a task name.');

            const item = createUpcomingItem(name, `Due: ${date || 'No date'}`, 'Task', '#4299e1', 'Task', 0, desc);
            appendUpcoming(item);
            addCalendarDot(date, '#4299e1');

            document.getElementById('taskName').value = '';
            document.getElementById('taskDate').value = '';
            document.getElementById('taskDesc').value = '';
        });

        document.getElementById('btnAddEvent').addEventListener('click', function () {
            const name = document.getElementById('eventName').value;
            const datetime = document.getElementById('eventDateTime').value;
            const desc = document.getElementById('eventDesc').value;
            if (!name) return alert('Please enter an event name.');

            const formattedDate = datetime ? new Date(datetime).toLocaleString() : 'No date';
            const item = createUpcomingItem(name, `Date: ${formattedDate}`, 'Event', '#9f7aea', 'Event', 0, desc);
            appendUpcoming(item);
            addCalendarDot(datetime, '#9f7aea');

            document.getElementById('eventName').value = '';
            document.getElementById('eventDateTime').value = '';
            document.getElementById('eventDesc').value = '';
        });

        document.getElementById('btnAddProject').addEventListener('click', function () {
            const name = document.getElementById('projectName').value;
            const dateTo = document.getElementById('projectDateTo').value;
            const progress = document.getElementById('projectCompletion').value;
            const desc = document.getElementById('projectDesc').value;
            if (!name) return alert('Please enter a project name.');

            const item = createUpcomingItem(name, `Due: ${dateTo || 'No date'}`, 'Project', '#38b2ac', 'Project', progress, desc);
            appendUpcoming(item);
            addCalendarDot(dateTo, '#38b2ac');

            document.getElementById('projectName').value = '';
            document.getElementById('projectCompletion').value = '0';
            document.getElementById('completionValue').innerText = '0%';
            document.getElementById('projectDesc').value = '';
        });

    </script>

    <!--Completed-->
    <div class="task-box" style="margin-top: 30px; margin-bottom: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" id="btnToggleCompleted">
            <h2 style="margin: 0;">Completed</h2>
            <svg id="completedChevron" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.3s; color: #4a5568;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div id="completedContainer" style="display: none; flex-direction: column; gap: 12px; margin-top: 24px;">
            <div style="text-align: center; color: #a0aec0; font-size: 14px; padding: 20px 0;" id="emptyCompletedState">
                No completed items yet.
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('btnToggleCompleted').addEventListener('click', function() {
            const container = document.getElementById('completedContainer');
            const chevron = document.getElementById('completedChevron');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'flex';
                chevron.style.transform = 'rotate(180deg)';
            } else {
                container.style.display = 'none';
                chevron.style.transform = 'rotate(0deg)';
            }
        });
    </script>
</div>
